<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adu.ah.hbao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            animation: bgFlash 2s infinite alternate;
        }
        @keyframes bgFlash {
            0% { background: #0a0000; }
            100% { background: #1a0000; }
        }
        .container {
            padding: 40px 30px;
            border: 4px solid #ff0000;
            border-radius: 30px;
            background: rgba(10, 0, 0, 0.9);
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.4), inset 0 0 50px rgba(255, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            animation: pulseBorder 1.5s ease-in-out infinite;
        }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 100px rgba(255, 0, 0, 0.4); }
            50% { box-shadow: 0 0 200px rgba(255, 0, 0, 0.8); }
            100% { box-shadow: 0 0 100px rgba(255, 0, 0, 0.4); }
        }

        .main-text {
            font-size: clamp(40px, 12vw, 80px);
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000, 0 0 100px #ff0000;
            line-height: 1.2;
            margin-bottom: 10px;
            animation: textShake 0.5s infinite alternate;
        }
        @keyframes textShake {
            0% { transform: rotate(-2deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.02); }
        }

        .sub-text {
            font-size: clamp(18px, 4vw, 32px);
            color: #ffcc00;
            text-shadow: 0 0 20px #ffcc00;
            margin: 10px 0 20px;
            letter-spacing: 2px;
        }

        .ip-box {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: bold;
            color: #00ff00;
            background: #111;
            padding: 15px 20px;
            border-radius: 15px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
        }
        .ip-box .label {
            font-size: 16px;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .tiktok {
            font-size: clamp(16px, 3vw, 24px);
            color: #ff66ff;
            text-shadow: 0 0 20px #ff66ff;
            margin: 15px 0;
        }
        .tiktok a {
            color: #ff66ff;
            text-decoration: none;
        }
        .tiktok a:hover {
            text-decoration: underline;
        }

        .fake-hack {
            font-size: 14px;
            color: #ff4444;
            background: rgba(255, 0, 0, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            display: inline-block;
            margin-top: 10px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .disclaimer {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            font-family: Arial, sans-serif;
        }
        .disclaimer span {
            color: #ff4444;
        }

        .crack-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,0,0,0.02) 2px, rgba(255,0,0,0.02) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,0,0,0.02) 2px, rgba(255,0,0,0.02) 4px);
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* Hiệu ứng loading giả */
        .scan-line {
            width: 100%;
            height: 3px;
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            margin: 15px 0;
            animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .small-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.1);
            font-family: Arial, sans-serif;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="crack-effect"></div>

    <div class="container">
        <div class="main-text">🔥 BỐ LÀ HBAO 🔥</div>
        <div class="sub-text">CHÚC MỪNG MÀY ĐÃ BỊ HACK IP 🗿</div>

        <div class="scan-line"></div>

        <div class="ip-box">
            <span class="label">📍 IP CỦA BẠN ĐÃ BỊ LỘ</span>
            <span id="ipDisplay">Đang lấy IP...</span>
        </div>

        <div class="tiktok">
            📱 TikTok: <a href="https://tiktok.com/@hoanggiabao2k11" target="_blank">@hoanggiabao2k11</a>
        </div>

        <div class="fake-hack">⚠️ ĐÃ GHI NHẬN IP - ĐANG PHÂN TÍCH DỮ LIỆU ⚠️</div>

        <div class="disclaimer">
            <span>💀</span> anh xin cái ip nhé các eiu 🗿 <span>💀</span>
        </div>
        <div class="small-text">*🫰😋 </div>
    </div>

    <script>
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('ipDisplay').textContent = data.ip;
            } catch {
                document.getElementById('ipDisplay').textContent = '❌ Không lấy được IP';
            }
        }
        getIP();

        // Tự động phát hiện trình duyệt
        console.log('Trang web này chỉ để troll nhẹ nhàng, không hack gì hết.');
    </script>
</body>
</html>
